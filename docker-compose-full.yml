services:
    timescaledb:
        image: timescale/timescaledb:latest-pg15
        container_name: crypto-trading-timescaledb
        environment:
            - POSTGRES_DB=${POSTGRES_DB:-crypto_trading}
            - POSTGRES_USER=${POSTGRES_USER:-postgres}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
        ports:
            - "${TIMESCALEDB_PORT:-5432}:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data

    serve:
        build:
            context: .
            dockerfile: Dockerfile.serve
        ports:
            - "${SERVE_PORT:-8362}:8000"
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
        environment:
            - DB_BACKEND=${DB_BACKEND:-postgres}
            - POSTGRES_URI=${POSTGRES_URI:-postgresql://postgres:postgres@timescaledb:5432/crypto_trading}
            - RETRIEVAL_SERVICE_URL=${RETRIEVAL_SERVICE_URL:-http://retrieval:8000}
            - PYTHONUNBUFFERED=${PYTHONUNBUFFERED:-1}
        depends_on:
            - timescaledb
            - retrieval

    retrieval:
        build:
            context: .
            dockerfile: Dockerfile.retrieval
        ports:
            - "${RETRIEVAL_PORT:-8000}:8000"
        environment:
            - DB_BACKEND=${DB_BACKEND:-postgres}
            - POSTGRES_URI=${POSTGRES_URI:-postgresql://postgres:postgres@timescaledb:5432/crypto_trading}
            - PYTHONUNBUFFERED=${PYTHONUNBUFFERED:-1}
        depends_on:
            - timescaledb

    record:
        build:
            context: .
            dockerfile: Dockerfile.record
        ports:
            - "${RECORD_PORT:-8300}:8300"
        environment:
            - DB_BACKEND=${DB_BACKEND:-postgres}
            - POSTGRES_URI=${POSTGRES_URI:-postgresql://postgres:postgres@timescaledb:5432/crypto_trading}
            - MIN_VALID_FEEDS=${MIN_VALID_FEEDS:-2}
            - PYTHONUNBUFFERED=${PYTHONUNBUFFERED:-1}
        depends_on:
            - timescaledb

    frontend:
        build:
            context: .
            dockerfile: Dockerfile.frontend
            target: development
        ports:
            - "${FRONTEND_PORT:-8080}:8080"
        environment:
            - VITE_BACKEND_URL=http://serve:8000
            - VITE_TRAIN_URL=http://train:8000

    embed:
        build:
            context: .
            dockerfile: services/embed/Dockerfile
        ports:
            - "8301:8301"
        environment:
            - DB_BACKEND=${DB_BACKEND:-postgres}
            - POSTGRES_URI=${POSTGRES_URI:-postgresql://postgres:postgres@timescaledb:5432/crypto_trading}
            - PYTHONUNBUFFERED=${PYTHONUNBUFFERED:-1}
        depends_on:
            - timescaledb

    jepa:
        build:
            context: .
            dockerfile: services/jepa/Dockerfile
        environment:
            - DB_BACKEND=${DB_BACKEND:-postgres}
            - POSTGRES_URI=${POSTGRES_URI:-postgresql://postgres:postgres@timescaledb:5432/crypto_trading}
            - PYTHONUNBUFFERED=${PYTHONUNBUFFERED:-1}
        depends_on:
            - timescaledb

    pressure:
        build:
            context: .
            dockerfile: services/pressure/Dockerfile
        environment:
            - DB_BACKEND=${DB_BACKEND:-postgres}
            - POSTGRES_URI=${POSTGRES_URI:-postgresql://postgres:postgres@timescaledb:5432/crypto_trading}
            - PYTHONUNBUFFERED=${PYTHONUNBUFFERED:-1}
        depends_on:
            - timescaledb

    predict:
        build:
            context: .
            dockerfile: services/predict/Dockerfile
        ports:
            - "${PREDICT_PORT:-8388}:8000"
        environment:
            - DB_BACKEND=${DB_BACKEND:-postgres}
            - POSTGRES_URI=${POSTGRES_URI:-postgresql://postgres:postgres@timescaledb:5432/crypto_trading}
            - PYTHONUNBUFFERED=${PYTHONUNBUFFERED:-1}
        depends_on:
            - timescaledb

    mongo:
        image: mongo:7.0
        container_name: crypto-trading-mongo
        environment:
            - MONGO_INITDB_DATABASE=crypto_sentiment
        ports:
            - "27017:27017"
        volumes:
            - mongo_data:/data/db

    sentiment:
        build:
            context: ./services/sentiment
            dockerfile: Dockerfile
        environment:
            - MONGODB_URI=mongodb://mongo:27017/
            - MONGODB_DATABASE=crypto_sentiment
            - PYTHONUNBUFFERED=1
            - TWITTER_BEARER_TOKEN=${TWITTER_BEARER_TOKEN}
            - TWITTER_API_KEY=${TWITTER_API_KEY}
            - TWITTER_API_SECRET=${TWITTER_API_SECRET}
            - TWITTER_ACCESS_TOKEN=${TWITTER_ACCESS_TOKEN}
            - TWITTER_ACCESS_TOKEN_SECRET=${TWITTER_ACCESS_TOKEN_SECRET}
        ports:
            - "8380:8080"
        depends_on:
            - mongo

    trade:
        build:
            context: .
            dockerfile: services/trade/Dockerfile
        environment:
            - DB_BACKEND=${DB_BACKEND:-postgres}
            - POSTGRES_URI=${POSTGRES_URI:-postgresql://postgres:postgres@timescaledb:5432/crypto_trading}
            - PYTHONUNBUFFERED=${PYTHONUNBUFFERED:-1}
        depends_on:
            - timescaledb

    train:
        build:
            context: .
            dockerfile: services/train/Dockerfile
        ports:
            - "${TRAIN_PORT:-8389}:8000"
        environment:
            - DB_BACKEND=${DB_BACKEND:-postgres}
            - POSTGRES_URI=${POSTGRES_URI:-postgresql://postgres:postgres@timescaledb:5432/crypto_trading}
            - PYTHONUNBUFFERED=${PYTHONUNBUFFERED:-1}
        depends_on:
            - timescaledb

    portainer:
        image: portainer/portainer-ce:latest
        container_name: crypto-trading-portainer
        restart: always
        ports:
            - "9443:9443"
            - "9000:9000"
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
            - portainer_data:/data

volumes:
    pgdata:
    mongo_data:
    portainer_data:
