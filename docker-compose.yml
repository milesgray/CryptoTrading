services:
    timescaledb:
        image: timescale/timescaledb:latest-pg15
        container_name: crypto-trading-timescaledb
        environment:
            - POSTGRES_DB=crypto_trading
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=postgres
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data

    serve:
        build:
            context: .
            dockerfile: Dockerfile.serve
        ports:
            - "8362:8000"
        environment:
            - DB_BACKEND=postgres
            - POSTGRES_URI=postgresql://postgres:postgres@timescaledb:5432/crypto_trading
            - RETRIEVAL_SERVICE_URL=http://retrieval:8000
            - PYTHONUNBUFFERED=1
        depends_on:
            - timescaledb
            - retrieval

    retrieval:
        build:
            context: .
            dockerfile: Dockerfile.retrieval
        ports:
            - "8000:8000"
        environment:
            - DB_BACKEND=postgres
            - POSTGRES_URI=postgresql://postgres:postgres@timescaledb:5432/crypto_trading
            - PYTHONUNBUFFERED=1
        depends_on:
            - timescaledb

    record:
        build:
            context: .
            dockerfile: Dockerfile.record
        ports:
            - "8300:8300"
        environment:
            - DB_BACKEND=postgres
            - POSTGRES_URI=postgresql://postgres:postgres@timescaledb:5432/crypto_trading
            - MIN_VALID_FEEDS=2
            - PYTHONUNBUFFERED=1
        depends_on:
            - timescaledb

    frontend:
        build:
            context: .
            dockerfile: Dockerfile.frontend
        ports:
            - "8080:8080"

volumes:
    pgdata:
