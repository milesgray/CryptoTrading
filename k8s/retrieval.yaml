apiVersion: apps/v1
kind: Deployment
metadata:
  name: retrieval
  namespace: crypto-trading
spec:
  replicas: 1
  selector:
    matchLabels:
      app: retrieval
  template:
    metadata:
      labels:
        app: retrieval
    spec:
      containers:
        - name: retrieval
          image: crypto-trading-retrieval:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: crypto-trading-config
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: retrieval
  namespace: crypto-trading
spec:
  selector:
    app: retrieval
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000