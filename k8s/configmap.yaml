apiVersion: v1
kind: ConfigMap
metadata:
  name: crypto-trading-config
  namespace: crypto-trading
data:
  POSTGRES_DB: "crypto_trading"
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "postgres"
  TIMESCALEDB_PORT: "5432"
  SERVE_PORT: "8362"
  RETRIEVAL_PORT: "8000"
  RECORD_PORT: "8300"
  FRONTEND_PORT: "8080"
  PREDICT_PORT: "8388"
  DB_BACKEND: "postgres"
  POSTGRES_URI: "postgresql://postgres:postgres@timescaledb:5432/crypto_trading"
  RETRIEVAL_SERVICE_URL: "http://retrieval:8000"
  PYTHONUNBUFFERED: "1"
  MIN_VALID_FEEDS: "2"
  VITE_BACKEND_URL: "http://serve:8000"