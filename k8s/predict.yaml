apiVersion: apps/v1
kind: Deployment
metadata:
  name: predict
  namespace: crypto-trading
spec:
  replicas: 1
  selector:
    matchLabels:
      app: predict
  template:
    metadata:
      labels:
        app: predict
    spec:
      containers:
        - name: predict
          image: crypto-trading-predict:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: crypto-trading-config
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: predict
  namespace: crypto-trading
spec:
  selector:
    app: predict
  ports:
    - protocol: TCP
      port: 8388
      targetPort: 8000