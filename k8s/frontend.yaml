apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: crypto-trading
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: crypto-trading-frontend:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: crypto-trading-config
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: crypto-trading
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080